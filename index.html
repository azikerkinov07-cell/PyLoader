<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyLoader - Download Python</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
        }

        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 1.5rem 8%;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(15px);
            text-align: center;
            z-index: 1000;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.6rem;
            font-weight: 700;
        }
        .logo span { color: #00ff9d; }

        .hero {
            text-align: center;
            padding: 160px 20px 80px;
        }

        .hero h1 {
            font-size: 4.2rem;
            font-family: 'Space Grotesk', sans-serif;
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 1.5rem;
            opacity: 0.8;
        }

        .version-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.2rem;
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px 80px;
        }

        .version-card {
            background: #111;
            padding: 45px 30px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid #222;
            transition: all 0.4s ease;
        }

        .version-card:hover {
            transform: translateY(-20px);
            border-color: #00ff9d;
            box-shadow: 0 30px 60px rgba(0, 255, 157, 0.15);
        }

        .version {
            font-size: 3rem;
            font-weight: 700;
            color: #00ff9d;
            margin: 15px 0;
        }

        .download-link {
            display: inline-block;
            margin-top: 25px;
            padding: 16px 40px;
            background: #00ff9d;
            color: black;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .download-link:hover {
            transform: scale(1.08);
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            color: #555;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">PyLoader<span>.</span></div>
    </nav>

    <div class="hero">
        <h1>Download Python</h1>
        <p>Any version from 3.5 to 3.14.6</p>
    </div>

    <div class="version-grid" id="versionGrid"></div>

    <footer>
        PyLoader © 2026 • All links lead to the official Python website
    </footer>

    <script>
        const versions = [
            "3.14.6", "3.13.4", "3.12.10", "3.11.12", "3.10.16",
            "3.9.21", "3.8.20", "3.7.17", "3.6.15", "3.5.10"
        ];

        function createCards() {
            const container = document.getElementById('versionGrid');
            container.innerHTML = '';

            versions.forEach(ver => {
                const card = document.createElement('div');
                card.className = 'version-card';
                card.innerHTML = `
                    <h3 style="font-size: 1.6rem; opacity: 0.9;">Python</h3>
                    <div class="version">${ver}</div>
                    <a href="https://www.python.org/downloads/release/python-${ver.replace(/\./g, '')}/"
                       target="_blank"
                       class="download-link">
                        <i class="fas fa-download"></i> Download
                    </a>
                `;
                container.appendChild(card);
            });
        }

        window.onload = createCards;
    </script>
</body>
</html>
